name: quiet_moments
description: A calm wellness companion. Gentle reminders to stand, stretch, hydrate, and breathe.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
